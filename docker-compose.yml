services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pdfgenerator-app
    restart: unless-stopped
    volumes:
      - ./:/var/www
    working_dir: /var/www
    depends_on:
      - mysql
    networks:
      - appnet

  mysql:
    image: mysql:8.0
    container_name: pdfgenerator-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: laravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - appnet

  nginx:
    image: nginx:alpine
    container_name: pdfgenerator-nginx
    restart: unless-stopped
    ports:
      - "82:80"
    depends_on:
      - app
    working_dir: /var/www
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - appnet

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: pdfgenerator-phpmyadmin
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - mysql
    networks:
      - appnet

volumes:
  mysql_data:

networks:
  appnet:
